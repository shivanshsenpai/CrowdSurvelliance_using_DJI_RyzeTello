{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneWatch - History Login</title>
    <link rel="stylesheet" href="{% static 'surveillance/vendor/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'surveillance/style.css' %}">
    <link rel="stylesheet" href="{% static 'surveillance/history.css' %}">
</head>
<body>
    <main class="history-login-shell">
        <section class="history-login-panel">
            <div style="display: flex; justify-content: flex-end; width: 100%; margin-top: -0.5rem; margin-bottom: 0.75rem;">
                <div class="theme-switch" id="theme-switch" role="group" aria-label="Theme">
                    <button class="theme-choice active" type="button" data-theme-choice="light" title="Light Mode">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                    </button>
                    <button class="theme-choice" type="button" data-theme-choice="dark" title="Dark Mode">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                    </button>
                </div>
            </div>
            <div class="history-brand">
                <span class="history-brand-icon">DW</span>
                <div>
                    <h1>DroneWatch</h1>
                    <span>History Access</span>
                </div>
            </div>

            <form class="history-login-form" method="post">
                {% csrf_token %}
                <label>
                    <span>Username</span>
                    <input type="text" name="username" value="shiv" autocomplete="username" required>
                </label>
                <label>
                    <span>Password</span>
                    <input type="password" name="password" autocomplete="current-password" required>
                </label>
                {% if error %}
                    <p class="history-login-error">{{ error }}</p>
                {% endif %}
                <button type="submit">Log In</button>
            </form>

            <a class="history-back-link" href="/">Back to live dashboard</a>
        </section>
    </main>
    <script src="{% static 'surveillance/theme.js' %}"></script>
</body>
</html>
